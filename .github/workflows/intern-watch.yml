name: Intern Watch

# Runs the ML/AI internship monitor on GitHub's servers — independent of your laptop.
# Deliberately uses NO `uses:` actions (no checkout/setup-python) so it runs even under a
# locked-down "Allow <owner> actions only" policy. It clones with git and uses system python3.
on:
  schedule:
    - cron: "0 15 * * *"   # ~08:00 America/Los_Angeles (PDT); 07:00 in winter (PST)
    - cron: "0 3 * * *"    # ~20:00 America/Los_Angeles (PDT); 19:00 in winter (PST)
  workflow_dispatch: {}     # adds a manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: intern-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Telegram secrets are set
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID not set. Add them under repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Clone, run agent, and persist state
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git clone --quiet "$REMOTE" repo
          cd repo
          git config user.name "intern-watch-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python3 --version
          python3 agent.py

          mkdir -p state
          date -u +"%Y-%m-%dT%H:%M:%SZ" > state/last_run.txt
          git add state/
          if git commit -m "chore: update watch state [skip ci]"; then
            for i in 1 2 3 4 5; do
              if git pull --rebase --autostash origin "${GITHUB_REF_NAME}" \
                 && git push "$REMOTE" "HEAD:${GITHUB_REF_NAME}"; then
                echo "state pushed"; break
              fi
              echo "push attempt $i failed; retrying in 5s"; sleep 5
            done
          else
            echo "no state changes"
          fi
